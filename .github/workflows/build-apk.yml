name: Build test APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - run: gradle assembleDebug
      - run: cp app/build/outputs/apk/debug/app-debug.apk MyCargoBusiness-test.apk
      - uses: actions/upload-artifact@v4
        with:
          name: my-cargo-business-test-apk
          path: MyCargoBusiness-test.apk
      - name: Publish direct APK download
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v0.1.0-test --yes --cleanup-tag || true
          gh release create v0.1.0-test MyCargoBusiness-test.apk --target "${{ github.event.pull_request.head.sha }}" --title "Мой грузовой бизнес — тестовая версия" --notes "Первая тестовая сборка для Android 12 и выше." --prerelease
