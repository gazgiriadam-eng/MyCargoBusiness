name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build test APK for pull request
        if: github.event_name == 'pull_request'
        run: |
          gradle assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk MyCargoBusiness.apk

      - name: Restore permanent signing key
        if: github.event_name != 'pull_request'
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          test -n "$SIGNING_KEY_BASE64" || (echo "SIGNING_KEY_BASE64 is not configured" && exit 1)
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/my-cargo-business-release.jks"

      - name: Build permanently signed APK
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/my-cargo-business-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_PASSWORD" || (echo "KEYSTORE_PASSWORD is not configured" && exit 1)
          test -n "$KEY_ALIAS" || (echo "KEY_ALIAS is not configured" && exit 1)
          test -n "$KEY_PASSWORD" || (echo "KEY_PASSWORD is not configured" && exit 1)
          gradle assembleRelease
          cp app/build/outputs/apk/release/app-release.apk MyCargoBusiness.apk

      - uses: actions/upload-artifact@v4
        with:
          name: my-cargo-business-apk
          path: MyCargoBusiness.apk

      - name: Publish current signed APK
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete current --yes --cleanup-tag || true
          gh release create current MyCargoBusiness.apk --target "${{ github.sha }}" --title "Мой грузовой бизнес — актуальная версия" --notes "Актуальная подписанная версия. Устанавливается поверх предыдущих постоянных версий без удаления данных." --prerelease
